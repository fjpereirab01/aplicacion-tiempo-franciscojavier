version: '3.8'

services:
  # ---- Contenedor PHP + Apache ----
  php:
    build: .
    container_name: aplicacion_tiempo
    volumes:
      - ./src:/var/www/html
      - ./apache/000-default.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: weatherapp
      DB_USER: weatheruser
      DB_PASS: weatherpass

  # ---- Contenedor MariaDB ----
  db:
    image: mariadb:10.11
    container_name: base_datos_tiempo
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: weatherapp
      MYSQL_USER: weatheruser
      MYSQL_PASSWORD: weatherpass
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  # ---- Contenedor Nginx (proxy inverso + HTTPS) ----
  nginx:
    image: nginx:alpine
    container_name: nginx_tiempo
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - php

  # ---- Contenedor Certbot (certificado SSL) ----
  certbot:
    image: certbot/certbot
    container_name: certbot_tiempo
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  db_data: