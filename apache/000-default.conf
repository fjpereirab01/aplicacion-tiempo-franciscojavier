# Configuración del sitio virtual principal de Apache

<VirtualHost *:80>
    # Correo del administrador del servidor
    ServerAdmin webmaster@localhost
    
    # Carpeta raíz donde Apache busca los archivos PHP
    DocumentRoot /var/www/html

    # Configuración de permisos para la carpeta raíz
    <Directory /var/www/html>
        # Permite usar .htaccess para configuraciones adicionales
        AllowOverride All
        # Permite el acceso a todos
        Require all granted
    </Directory>

    # Archivo donde se guardan los errores de Apache
    ErrorLog ${APACHE_LOG_DIR}/error.log
    
    # Archivo donde se guardan los accesos al servidor
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>